apiVersion: 1

datasources:
  - name: InfluxDB
    uid: influxdb_v2
    type: influxdb
    access: proxy
    isDefault: true
    editable: true
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: ${INFLUX_ORG}
      defaultBucket: ${INFLUX_BUCKET}
      tlsSkipVerify: true
    secureJsonData:
      token: ${INFLUXDB_ADMIN_TOKEN}
